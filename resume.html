<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signature Basketball Shoes — Resume</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body {
      font-family: 'Inter', Arial, sans-serif;
      margin: 0;
      padding: 80px 20px 40px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #ff6b35 100%);
      background-attachment: fixed;
      color: #1c1c1c;
      min-height: 100vh;
    }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .brand {
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(45deg, #ff6b35, #2a5298);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .menu-wrap {
      position: relative;
    }
    .menu-button {
      border: none;
      background: linear-gradient(45deg, #ff6b35, #2a5298);
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .menu-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
    }
    .menu-panel {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 12px;
      width: 170px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      box-shadow: 0 14px 32px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .menu-panel a {
      display: block;
      padding: 12px 16px;
      color: #1c1c1c;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .menu-panel a:hover {
      background: linear-gradient(45deg, #ff6b35, #2a5298);
      color: #ffffff;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    h1 {
      margin-top: 0;
      font-size: 2.6rem;
      letter-spacing: -0.04em;
      background: linear-gradient(45deg, #ff6b35, #2a5298);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.7;
      margin-top: 1.2rem;
      text-align: center;
      color: #4a4a4a;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">Signature Basketball Shoes</div>
    <div class="menu-wrap">
      <button class="menu-button" aria-expanded="false" aria-controls="page-menu">Menu</button>
      <nav id="page-menu" class="menu-panel" hidden>
        <a href="mainpage.html">Home</a>
        <a href="resume.html">Resume</a>
        <a href="scratch.html">Scratch</a>
        <a href="webapp.html">Web App</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <h1>Resume</h1>
    <p>This page is a placeholder for the resume section. Use the menu button above to visit any page in the site.</p>
  </div>
  <script>
    const menuButton = document.querySelector('.menu-button');
    const pageMenu = document.getElementById('page-menu');
    menuButton.addEventListener('click', () => {
      const isOpen = pageMenu.hasAttribute('hidden');
      if (isOpen) {
        pageMenu.removeAttribute('hidden');
        menuButton.setAttribute('aria-expanded', 'true');
      } else {
        pageMenu.setAttribute('hidden', '');
        menuButton.setAttribute('aria-expanded', 'false');
      }
    });
    document.addEventListener('click', event => {
      if (!event.target.closest('.menu-wrap')) {
        pageMenu.setAttribute('hidden', '');
        menuButton.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
</body>
</html>
