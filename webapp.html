<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pro Basketball: High Score Challenge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 100px 16px 40px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #ff6b35 100%);
            background-attachment: fixed;
            color: #1c1c1c;
            min-height: 100vh;
        }
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .brand {
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-right: 12px;
            background: linear-gradient(45deg, #ff6b35, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .menu-wrap {
            position: relative;
        }
        .menu-button {
            border: none;
            background: linear-gradient(45deg, #ff6b35, #2a5298);
            color: #ffffff;
            padding: 12px 18px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            min-width: 120px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .menu-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }
        .menu-panel {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 12px;
            width: min(95vw, 220px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 14px 32px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .menu-panel a {
            display: block;
            padding: 12px 16px;
            color: #1c1c1c;
            text-decoration: none;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .menu-panel a:hover {
            background: linear-gradient(45deg, #ff6b35, #2a5298);
            color: #ffffff;
        }
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 32px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            margin-top: 0;
            font-size: clamp(2rem, 2.6vw, 2.8rem);
            letter-spacing: -0.04em;
            background: linear-gradient(45deg, #ff6b35, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        p {
            font-size: clamp(1rem, 1.4vw, 1.05rem);
            line-height: 1.7;
            margin-top: 1rem;
            text-align: center;
            color: #4a4a4a;
        }
        #game-container {
            position: relative;
            width: min(100%, 620px);
            max-width: 100%;
            margin: 30px auto 0;
            border: 8px solid #333;
            border-radius: 12px;
            background: #000022;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            touch-action: none;
        }
        .instructions {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            width: 100%;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
        }
        @media (max-width: 640px) {
            body {
                padding: 100px 12px 24px;
            }
            .topbar {
                padding: 12px 14px;
            }
            .container {
                padding: 24px;
            }
            .menu-button {
                width: 100%;
                max-width: none;
            }
            .menu-panel {
                right: auto;
                left: 0;
            }
            .instructions {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">Signature Basketball Shoes</div>
    <div class="menu-wrap">
      <button class="menu-button" aria-expanded="false" aria-controls="page-menu">Menu</button>
      <nav id="page-menu" class="menu-panel" hidden>
        <a href="mainpage.html">Home</a>
        <a href="resume.html">Resume</a>
        <a href="webapp.html">Web App</a>
        <a href="fantracker.html">Fan Tracker</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <h1>Retro Pro Basketball: High Score Challenge</h1>
    <p>Take your talents to the hardwood and test your shot out! Try for the high score!</p>
    <div id="game-container">
      <canvas id="gameCanvas" width="600" height="600"></canvas>
      <div class="instructions">SPACE TO LOCK AIM | MISS = RESET</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menuButton = document.querySelector('.menu-button');
    const pageMenu = document.getElementById('page-menu');

    function toggleMenu() {
      const isOpen = pageMenu.hasAttribute('hidden');
      if (isOpen) {
        pageMenu.removeAttribute('hidden');
        menuButton.setAttribute('aria-expanded', 'true');
      } else {
        pageMenu.setAttribute('hidden', '');
        menuButton.setAttribute('aria-expanded', 'false');
      }
    }

    menuButton.addEventListener('click', toggleMenu);
    document.addEventListener('click', event => {
      if (!event.target.closest('.menu-wrap')) {
        pageMenu.setAttribute('hidden', '');
        menuButton.setAttribute('aria-expanded', 'false');
      }
    });

    function handleInput() {
      if (gameState === 'vert') {
        gameState = 'horiz';
      } else if (gameState === 'horiz') {
        isJumping = true;
        calculateShot();
        gameState = 'shooting';
      }
    }

    window.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        handleInput();
      }
    });

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      handleInput();
    });

    // Game State
    let score = 0;
    let highScore = parseInt(localStorage.getItem('retroHoopsHiScore') || '0', 10);
    let gameState = 'vert';
    let speed = 1.0;
    let distance = 0;
    let message = 'GET READY!';
    let msgColor = '#0f0';

    // Sliders
    let vPos = 0; let vDir = 1;
    let hPos = 0; let hDir = 1;

    // Entities
    let ball = { x: 300, y: 530, tx: 300, ty: 530, size: 12 };
    let isJumping = false;

    const fans = [];
    for (let i = 0; i < 100; i++) {
      fans.push({
        x: (i % 25) * 24,
        y: Math.floor(i / 25) * 20 + 130,
        color: i % 2 === 0 ? '#a00' : '#00a',
        jump: 0
      });
    }

    function drawArena() {
      ctx.fillStyle = '#c68642';
      ctx.fillRect(0, 320, 600, 280);
      ctx.fillStyle = '#8b4513';
      const keyWidth = 180 - (distance * 20);
      ctx.fillRect(300 - keyWidth / 2, 320, keyWidth, 280);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 4;
      ctx.strokeRect(300 - keyWidth / 2, 320, keyWidth, 280);
      ctx.fillStyle = '#000';
      ctx.fillRect(120, 10, 360, 90);
      ctx.strokeStyle = '#444';
      ctx.strokeRect(120, 10, 360, 90);
      ctx.fillStyle = msgColor;
      ctx.font = "bold 22px 'Courier New'";
      ctx.textAlign = 'center';
      ctx.fillText(message, 300, 42);
      ctx.fillStyle = '#fff';
      ctx.font = "14px 'Courier New'";
      ctx.fillText(`SCORE: ${score}  |  HI-SCORE: ${highScore}`, 300, 70);
      ctx.fillStyle = '#aaa';
      ctx.fillText(`RANGE: ${['FREE THROW','3-POINTER','HALF COURT'][distance]}`, 300, 88);
      fans.forEach(f => {
        ctx.fillStyle = f.color;
        ctx.fillRect(f.x, f.y - f.jump, 20, 15);
        ctx.fillStyle = '#ffdbac';
        ctx.fillRect(f.x + 5, f.y - 8 - f.jump, 10, 8);
      });
      const s = 1 - (distance * 0.15);
      const hx = 300;
      const hy = 220;
      ctx.fillStyle = 'white';
      ctx.fillRect(hx - 60 * s, hy - 80 * s, 120 * s, 90 * s);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.strokeRect(hx - 60 * s, hy - 80 * s, 120 * s, 90 * s);
      ctx.strokeStyle = 'red';
      ctx.lineWidth = 4 * s;
      ctx.strokeRect(hx - 25 * s, hy - 45 * s, 50 * s, 40 * s);
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(hx - 20 * s + (i * 8 * s), hy + 5 * s);
        ctx.lineTo(hx - 15 * s + (i * 6 * s), hy + 35 * s);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(hx - 20 * s, hy + 15 * s + (i * 4 * s));
        ctx.lineTo(hx + 20 * s, hy + 15 * s + (i * 4 * s));
        ctx.stroke();
      }
      ctx.fillStyle = '#ff4500';
      ctx.fillRect(hx - 25 * s, hy + 2 * s, 50 * s, 6 * s);
    }

    function drawPlayer() {
      const px = 300;
      const py = 500 + (distance * 25);
      ctx.fillStyle = '#111199';
      if (isJumping) {
        ctx.fillRect(px - 20, py - 80, 40, 50);
        ctx.fillStyle = '#ffdbac';
        ctx.fillRect(px - 12, py - 105, 24, 25);
        ctx.fillRect(px - 30, py - 100, 10, 40);
        ctx.fillRect(px + 20, py - 100, 10, 40);
      } else {
        ctx.fillRect(px - 20, py - 50, 40, 50);
        ctx.fillStyle = '#ffdbac';
        ctx.fillRect(px - 12, py - 75, 24, 25);
      }
    }

    function drawUI() {
      ctx.fillStyle = '#333';
      ctx.fillRect(50, 350, 20, 150);
      ctx.fillStyle = 'red';
      ctx.fillRect(50, 350 + 65, 20, 20);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(50, 350 + vPos * 1.5, 20, 8);
      ctx.fillStyle = '#333';
      ctx.fillRect(225, 560, 150, 20);
      ctx.fillStyle = 'red';
      ctx.fillRect(225 + 65, 560, 20, 20);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(225 + hPos * 1.5, 560, 8, 20);
    }

    function update() {
      if (gameState === 'vert') {
        vPos += speed * vDir;
        if (vPos > 95 || vPos < 0) vDir *= -1;
      } else if (gameState === 'horiz') {
        hPos += speed * hDir;
        if (hPos > 95 || hPos < 0) hDir *= -1;
      } else if (gameState === 'shooting') {
        ball.x += (ball.tx - ball.x) * 0.08;
        ball.y += (ball.ty - ball.y) * 0.08;
        if (Math.abs(ball.y - ball.ty) < 3) resolveShot();
      }
    }

    function calculateShot() {
      const vErr = Math.abs(vPos - 47);
      const hErr = Math.abs(hPos - 47);
      ball.tx = 300 + (hPos - 47) * 12;
      ball.ty = 230 + (vPos - 47) * 12;
      if (vErr < 10 && hErr < 10) {
        message = 'SWISH!!';
        msgColor = '#0f0';
        ball.tx = 300;
        ball.ty = 240;
        return true;
      } else {
        if (vErr < 22 && hErr < 22) {
          message = 'BRICK!';
          msgColor = 'yellow';
        } else {
          message = 'AIRBALL!';
          msgColor = 'red';
        }
        return false;
      }
    }

    function resolveShot() {
      if (message === 'SWISH!!') {
        score++;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('retroHoopsHiScore', highScore);
        }
        speed += 0.12;
        distance = Math.min(2, Math.floor(score / 3));
        fans.forEach(f => f.jump = 15);
        setTimeout(() => {
          resetTurn('GO AGAIN');
        }, 1200);
      } else {
        setTimeout(() => {
          score = 0;
          speed = 1.0;
          distance = 0;
          resetTurn('GAME OVER - RESET');
        }, 1500);
      }
      gameState = 'result';
    }

    function resetTurn(msg) {
      gameState = 'vert';
      isJumping = false;
      ball.y = 530;
      ball.x = 300;
      fans.forEach(f => f.jump = 0);
      message = msg;
    }

    function gameLoop() {
      ctx.clearRect(0, 0, 600, 600);
      update();
      drawArena();
      drawPlayer();
      if (gameState === 'vert' || gameState === 'horiz') drawUI();
      if (gameState === 'shooting' || gameState === 'result') {
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
